version: '3.8'

services:
  emqx:
    image: emqx/emqx:latest
    container_name: emqx
    ports:
      - "18083:18083" # Dashboard UI (admin/public)
      - "1883:1883"   # MQTT Port
      - "8083:8083"   # MQTT/WebSocket
      - "8883:8883"   # MQTT/SSL
      - "8084:8084"   # WSS Port
    volumes:
      - ./emqx_data:/opt/emqx/data
      - ./emqx_log:/opt/emqx/log
    restart: always